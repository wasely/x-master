<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>X Master App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0a0a0a;
      color: #e4e4e7;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      color: #fff;
    }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #71717a;
      margin-bottom: 6px;
    }

    input {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #e4e4e7;
      font-size: 13px;
      outline: none;
    }

    input:focus { border-color: rgba(255,255,255,0.2); }

    button {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 9px 12px;
      background: #fff;
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    button:hover { background: #e4e4e7; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #71717a;
      min-height: 16px;
      text-align: center;
    }

    .hint {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      line-height: 1.6;
      color: #52525b;
    }
  </style>
</head>
<body>
  <h1>X Master App</h1>

  <label for="appUrl">App URL</label>
  <input id="appUrl" type="url" placeholder="http://localhost:3000" spellcheck="false" />

  <div style="display:flex;gap:8px;margin-top:12px">
    <button id="save" style="flex:1;margin-top:0">Save</button>
    <button id="detect" style="flex:1;margin-top:0;background:#18181b;color:#e4e4e7;border:1px solid rgba(255,255,255,0.1)">Auto-detect</button>
  </div>
  <p id="status"></p>

  <p class="hint">Right-click any tweet on X and choose<br>
    <strong style="color:#a1a1aa">"Add tweet to style library"</strong> or<br>
    <strong style="color:#a1a1aa">"Save as my draft"</strong>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
